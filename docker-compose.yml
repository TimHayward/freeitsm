services:
  app:
    build: .
    container_name: freeitsm-app
    hostname: freeitsm-app
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_SERVER: db
      DB_NAME: freeitsm
      DB_USERNAME: freeitsm
      DB_PASSWORD: freeitsm
      ENCRYPTION_KEY_PATH: /var/www/encryption_keys/freeitsm.key

    volumes:
      - attachments:/var/www/html/tickets/attachments
      - cm-attachments:/var/www/html/change-management/attachments
      - encryption-keys:/var/www/encryption_keys

    networks:
      - freeitsm-net
      - proxy

  db:
    image: mysql:8.0
    container_name: freeitsm-db
    hostname: freeitsm-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: freeitsm
      MYSQL_USER: freeitsm
      MYSQL_PASSWORD: freeitsm

    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      - db-data:/var/lib/mysql
      - ./database/freeitsm.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - freeitsm-net

volumes:
  db-data:
  attachments:
  cm-attachments:
  encryption-keys:

networks:
  freeitsm-net:
    driver: bridge

  proxy:
    external: true
